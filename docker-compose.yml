version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build: .
    container_name: fastapi
    restart: always
    entrypoint: ["/app/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - CN8N_API_KEY=${CN8N_API_KEY:-}
      - CN8N_ARTICLES_PER_ACCOUNT=${CN8N_ARTICLES_PER_ACCOUNT:-2}
      - COLLECTION_SCHEDULE_HOURS=${COLLECTION_SCHEDULE_HOURS:-8}
      - COLLECTION_ACCOUNTS_PER_RUN=${COLLECTION_ACCOUNTS_PER_RUN:-20}
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - PLAN_CACHE_TTL_SECONDS=${PLAN_CACHE_TTL_SECONDS:-600}
      - REWRITE_CACHE_TTL_SECONDS=${REWRITE_CACHE_TTL_SECONDS:-3600}

volumes:
  pgdata:
  redisdata:
