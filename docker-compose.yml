version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: nexus_agent
      POSTGRES_PASSWORD: nexus_agent
      POSTGRES_DB: nexus_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data

  backend:
    build: .
    container_name: fastapi
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexus_agent:nexus_agent@db:5432/nexus_agent
      - CN8N_API_KEY=${CN8N_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - PLAN_CACHE_TTL_SECONDS=${PLAN_CACHE_TTL_SECONDS:-600}
      - REWRITE_CACHE_TTL_SECONDS=${REWRITE_CACHE_TTL_SECONDS:-3600}

volumes:
  pgdata:
  redisdata:
